<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Vercel Spirit Coins - Official Top-up Center</title>
    <meta name="title" content="Vercel Spirit Coins - Official Top-up Center">
    <meta name="description" content="Get your Spirit Coins at the official Vercel Top-up Center. Fast, secure, and reliable game currency market.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vercel-spirit-coins.vercel.app/">
    <meta property="og:title" content="Vercel Spirit Coins - Official Top-up Center">
    <meta property="og:description" content="Securely top up your Spirit Coins. Instant delivery and official market rates.">
    <meta property="og:image" content="https://raw.githubusercontent.com/kiyomiii143-netizen/process/refs/heads/main/1776341395970.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://vercel-spirit-coins.vercel.app/">
    <meta property="twitter:title" content="Vercel Spirit Coins - Official Top-up Center">
    <meta property="twitter:description" content="Securely top up your Spirit Coins. Instant delivery and official market rates.">
    <meta property="twitter:image" content="https://raw.githubusercontent.com/kiyomiii143-netizen/process/refs/heads/main/1776341395970.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://pl29169639.profitablecpmratenetwork.com/68/a5/13/68a513cb9f8b5a2e6996ab8896cf65e3.js"></script>
    <script src="https://pl29169638.profitablecpmratenetwork.com/91/6f/cb/916fcb02a1a348d5c85778573d558235.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b0f1a] font-sans text-white overflow-x-hidden">

    <div id="sticky-banner" class="fixed top-0 start-0 z-[70] flex justify-between w-full p-4 border-b border-gray-800 bg-[#1e293b]">
        <div class="flex items-center mx-auto">
            <p class="flex items-center text-sm font-normal text-gray-300">
                <span class="inline-flex items-center justify-center w-6 h-6 shrink-0 me-2.5 bg-yellow-500 rounded-full">
                    <svg class="w-3.5 h-3.5 text-black" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 9H5a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h6m0-6v6m0-6 5.419-3.87A1 1 0 0 1 18 5.942v12.114a1 1 0 0 1-1.581.814L11 15m7 0a3 3 0 0 0 0-6M6 15h3v5H6v-5Z"/></svg>
                </span>
                <span>Flash Sale Ends In: <span id="timer" class="font-black text-yellow-500 ml-1">03:00</span></span>
            </p>
        </div>
        <button onclick="dismissBanner()" class="text-gray-400 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
    </div>

    <div id="content-wrapper" class="main-content-wrapper pt-16">
        <div id="store-view" class="max-w-5xl mx-auto p-4 md:p-10 pb-40">
            <header class="mb-8 overflow-hidden rounded-xl border border-gray-800 shadow-2xl">
                <img src="https://raw.githubusercontent.com/kiyomiii143-netizen/process/refs/heads/main/1776341395970.png" 
                     alt="Vercel Spirit Coins Banner" 
                     class="w-full h-auto object-cover rounded-xl block">
            </header>

            <div id="input-section" class="grid grid-cols-2 gap-3 mb-8 scroll-mt-24">
                <div class="relative">
                    <input type="text" id="uid_input" class="block px-2.5 pb-2.5 pt-4 w-full text-sm text-white bg-transparent rounded-lg border border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-yellow-500 peer" placeholder=" " />
                    <label for="uid_input" class="absolute text-sm text-gray-400 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-[#0b0f1a] px-2 peer-focus:px-2 peer-focus:text-yellow-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 start-1">Enter UID</label>
                </div>
                <div class="relative">
                    <input type="number" id="otp_input" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);" class="block px-2.5 pb-2.5 pt-4 w-full text-sm text-white bg-transparent rounded-lg border border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-yellow-500 peer" placeholder=" " />
                    <label for="otp_input" class="absolute text-sm text-gray-400 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-[#0b0f1a] px-2 peer-focus:px-2 peer-focus:text-yellow-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 start-1">OTP (4 Digits)</label>
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4" id="product-grid"></div>
        </div>
    </div>

    <div data-popover id="popover-validation" role="tooltip" class="absolute z-[150] invisible inline-block w-64 text-sm text-gray-900 transition-opacity duration-300 bg-white border border-gray-200 rounded-lg shadow-xl opacity-0">
        <div class="px-3 py-2 bg-gray-100 border-b border-gray-200 rounded-t-lg">
            <h3 class="font-bold text-red-600 uppercase text-[10px]">Action Required</h3>
        </div>
        <div class="px-3 py-2">
            <p id="popover-message" class="font-medium text-gray-700"></p>
        </div>
        <div data-popper-arrow></div>
    </div>

    <div id="payment-view" class="fixed inset-0 bg-[#f8f5f5] z-[120] translate-y-full invisible pointer-events-none overflow-y-auto">
        <div class="max-w-lg mx-auto min-h-screen pb-32 text-gray-800">
            <div class="p-4 flex items-center bg-white border-b sticky top-0 z-10">
                <button onclick="closePayment()" class="mr-3 p-1 text-gray-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg></button>
                <span class="font-bold">Checkout Summary</span>
            </div>
            
            <div class="p-4 space-y-4">
                <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                    <h4 class="font-bold text-xs text-gray-400 uppercase mb-4">Packages (<span id="payment-count">0</span>)</h4>
                    <div id="payment-items-list" class="flex space-x-4 overflow-x-auto pb-2"></div>
                </div>
                <div class="bg-white rounded-xl p-4 shadow-sm border flex justify-between font-black text-xl">
                    <span>Total Amount</span>
                    <span class="text-[#d35a44]" id="payment-final-total">0.00 PHP</span>
                </div>
                <div class="bg-white rounded-xl shadow-sm border-2 border-[#d35a44]/20 p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <img data-src="gcash" class="w-10 h-10 object-contain rounded-lg cached-img">
                        <span class="font-bold text-sm">GCash</span>
                    </div>
                    <div class="w-6 h-6 rounded-full bg-[#d35a44] flex items-center justify-center shadow-md text-white">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                    </div>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex flex-col items-center shadow-2xl">
                <div class="flex justify-between w-full mb-3 text-sm font-bold"><span class="text-gray-400 uppercase">Payable:</span><span class="text-[#d35a44]" id="bottom-payment-total">0.00 PHP</span></div>
                <button id="payment-submit-btn" onclick="showQR()" class="w-full bg-[#d35a44] text-white py-4 rounded-xl font-black text-lg active:scale-95 transition-transform uppercase tracking-wider">Confirm and Pay</button>
            </div>
        </div>
    </div>

    <div id="qr-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm opacity-0">
        <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
            <div class="bg-[#007dfe] p-4 flex justify-between items-center text-white">
                <span class="font-bold uppercase text-xs tracking-widest">Scan to Pay</span>
                <button onclick="hideQR()" class="p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-8 flex flex-col items-center">
                <div id="qrcode" class="p-3 bg-white border border-gray-100 rounded-xl mb-6"></div>
                <div class="w-full bg-gray-50 rounded-xl p-4 border border-gray-100">
                    <div class="flex justify-between text-[10px] text-gray-400 font-bold uppercase"><span>Amount</span><span class="text-[#d35a44] font-black" id="qr-amount-display">0.00 PHP</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="sticky-bar" class="fixed bottom-0 left-0 right-0 z-[100] flex flex-col items-center pointer-events-none">
        <div id="cart-drawer" class="w-full max-w-lg bg-white rounded-t-3xl overflow-hidden shadow-2xl translate-y-full text-gray-900 pointer-events-auto">
            <div class="p-5 flex justify-between items-center bg-gray-50 border-b">
                <h3 class="font-black text-lg text-gray-800">My Cart (<span id="drawer-count">0</span>)</h3>
                <button onclick="toggleCart()" class="text-gray-400 p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg></button>
            </div>
            <div id="cart-items-container" class="p-6 max-h-[40vh] overflow-y-auto space-y-5 bg-white"></div>
            <div class="p-6 bg-gray-50 border-t">
                <div class="flex justify-between items-center font-black text-xl"><span>Subtotal</span><span class="text-red-600" id="drawer-total">0.00 PHP</span></div>
            </div>
        </div>
        
        <div class="w-full bg-[#2a2626] h-20 flex shadow-2xl pointer-events-auto relative sticky-bar-base">
            <div onclick="toggleCart()" class="flex-1 flex items-center px-6 cursor-pointer">
                <div class="relative mr-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span id="bar-count" class="absolute -top-1 -right-2 bg-yellow-500 text-black text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full ring-2 ring-[#2a2626]">0</span>
                </div>
                <div class="flex flex-col"><span class="text-gray-400 text-[10px] uppercase font-bold tracking-widest">Payable</span><div class="flex items-center text-white"><span id="bar-total" class="text-xl font-black">0.00 PHP</span><svg id="arrow-icon" class="w-4 h-4 ml-2 transition-transform duration-300" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7"></path></svg></div></div>
            </div>
            <button id="store-submit-btn" onclick="openPayment()" class="w-1/3 bg-[#f3bc3e] text-black text-xl font-black uppercase active:scale-95 transition-all">Submit</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
